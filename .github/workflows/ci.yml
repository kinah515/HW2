name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push 될 때만 작동

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Docker Hub 사용자명과 이미지 이름을 태그로 설정 (fashion-ai-mvp)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:latest
          # 빌드 캐시를 활용해 재빌드 속도 최적화
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:buildcache,mode=max

  deploy-to-local:
    needs: docker-build-push # 빌드 잡이 성공적으로 끝나야만 실행됨
    runs-on: self-hosted     # 로컬 컴퓨터에 등록된 런너로 실행됨

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull --platform linux/amd64 ${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:latest

      - name: Stop and remove existing container (if running)
        run: |
          docker stop fashion-ai-mvp || true
          docker rm fashion-ai-mvp || true

      - name: Run new container
        run: |
          docker run -d \
            --platform linux/amd64 \
            --name fashion-ai-mvp \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:latest
